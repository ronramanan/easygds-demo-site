version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
        - mkdir -p dist
        - cp index.html styles.css tailwind-main.css scripts.js salamair.js favicon.png favicon.svg easygds_logo_transparent.png dist/
        - cp -r images img dist/
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
